<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AquaScraper – monitoring návštěvnosti</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f7fa; padding: 20px; color: #333; }
  h1 { margin-bottom: 8px; font-size: 1.4rem; }
  .toolbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  .last-updated { font-size: .8rem; color: #999; }
  .refresh-btn { background: #3b82f6; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: .85rem; }
  .refresh-btn:hover { background: #2563eb; }
  .error { color: #dc2626; margin: 10px 0; font-size: .9rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .chart-card { background: #fff; border-radius: 10px; padding: 14px 16px 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .chart-card h2 { font-size: .85rem; color: #555; margin-bottom: 4px; font-weight: 600; }
  .chart-card .hint { font-size: .7rem; color: #aaa; margin-bottom: 6px; }
  .chart-card canvas { max-height: 220px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 12px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); flex: 1; min-width: 100px; text-align: center; }
  .stat-card .value { font-size: 1.6rem; font-weight: 700; }
  .stat-card .label { font-size: .75rem; color: #777; margin-top: 2px; }
  .stat-card.temp .value { font-size: 1.1rem; }
</style>
</head>
<body>

<h1>🏊 Aquacentrum Pardubice – monitoring návštěvnosti</h1>

<div class="toolbar">
  <div class="last-updated" id="lastUpdated"></div>
  <button class="refresh-btn" onclick="fetchData()">Obnovit data</button>
  <button class="refresh-btn" onclick="resetZoom()" style="background:#6b7280">Reset zoomu</button>
</div>
<div class="error" id="error"></div>
<div class="stats" id="stats"></div>

<div class="grid" id="chartGrid"></div>

<script>
// chartjs-plugin-zoom CDN zpřístupňuje globální `ChartZoom` (UMD)
if (typeof ChartZoom !== "undefined") Chart.register(ChartZoom);

const COLOR = {
  bazen: "#3b82f6",
  aqua: "#10b981",
  letni_areal: "#f59e0b",
  wellness: "#ef4444",
  rekreaeni: "#f97316",
  brouzdaliste: "#06b6d4",
};

let charts = {};

function fmtDate(iso) {
  return new Date(iso).toLocaleString("cs-CZ", { day: "numeric", month: "numeric", hour: "2-digit", minute: "2-digit" });
}

function mkStat(label, value, cls = "") {
  const card = document.createElement("div");
  card.className = "stat-card" + (cls ? " " + cls : "");
  card.innerHTML = `<div class="value">${value}</div><div class="label">${label}</div>`;
  return card;
}

function renderStats(dayGroups) {
  const container = document.getElementById("stats");
  container.innerHTML = "";
  if (!dayGroups.length || !dayGroups[0].readings.length) {
    container.innerHTML = "<p>Zatím žádná data.</p>";
    return;
  }
  const latest = dayGroups[0].readings[dayGroups[0].readings.length - 1];
  const cards = [
    mkStat("🏊 bazén", latest.bazen ?? "—"),
    mkStat("🌊 aqua", latest.aqua ?? "—"),
    mkStat("☀️ letní areál", latest.letni_areal ?? "—"),
    mkStat("🧖 wellness", latest.wellness ?? "—"),
    mkStat("🌡️ rekreační", (latest.rekreaeni_temp ?? "—") + " °C", "temp"),
    mkStat("🌡️ brouzdaliště", (latest.brouzdaliste_temp ?? "—") + " °C", "temp"),
  ];
  cards.forEach(c => container.appendChild(c));
  document.getElementById("lastUpdated").textContent =
    "Poslední měření: " + fmtDate(dayGroups[0].date);
}

function makeZoomOpts() {
  return {
    pan: { enabled: true, mode: "y", modifierKey: "shift" },
    zoom: {
      drag: { enabled: true, backgroundColor: "rgba(59,130,246,.15)", borderColor: "#3b82f6", borderWidth: 1 },
      wheel: { enabled: true },
      pinch: { enabled: true },
      mode: "y",
      onZoomComplete({ chart }) { chart.update("none"); },
    },
  };
}

function lightenColor(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const nr = Math.round(r + (255 - r) * factor);
  const ng = Math.round(g + (255 - g) * factor);
  const nb = Math.round(b + (255 - b) * factor);
  return `rgb(${nr},${ng},${nb})`;
}

function fmtTick(m) {
  const h = Math.floor(m / 60);
  const min = Math.round(m % 60);
  return `${String(h).padStart(2, "0")}:${String(min).padStart(2, "0")}`;
}

function fmtDayLabel(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const days = ["Ne", "Po", "Út", "St", "Čt", "Pá", "So"];
  return d.getDate() + "." + (d.getMonth()+1) + ". " + days[d.getDay()];
}

function buildCharts(dayGroups) {
  const grid = document.getElementById("chartGrid");
  grid.innerHTML = "";
  charts = {};

  const metrics = [
    { id: "bazen", label: "bazén", color: COLOR.bazen, yTitle: "počet osob", key: "bazen" },
    { id: "aqua", label: "aqua", color: COLOR.aqua, yTitle: "počet osob", key: "aqua" },
    { id: "letni_areal", label: "letní areál", color: COLOR.letni_areal, yTitle: "počet osob", key: "letni_areal" },
    { id: "wellness", label: "wellness", color: COLOR.wellness, yTitle: "počet osob", key: "wellness" },
    { id: "rekreaeni", label: "rekreační", color: COLOR.rekreaeni, yTitle: "°C", key: "rekreaeni_temp", fix: true },
    { id: "brouzdaliste", label: "brouzdaliště", color: COLOR.brouzdaliste, yTitle: "°C", key: "brouzdaliste_temp", fix: true },
  ];

  for (const m of metrics) {
    const card = document.createElement("div");
    card.className = "chart-card";
    card.innerHTML = `
      <h2>${m.label}</h2>
      <div class="hint">táhni myší pro přiblížení (osa Y) · shift+tažení pro posun · kolečko zoom</div>
      <canvas id="chart-${m.id}"></canvas>
    `;
    grid.appendChild(card);

    const ctx = card.querySelector("canvas").getContext("2d");

    const datasets = [];
    for (let i = 0; i < dayGroups.length; i++) {
      const day = dayGroups[i];
      const points = day.readings
        .filter(r => r[m.key] != null)
        .map(r => ({ x: r.t, y: r[m.key] }));

      if (points.length === 0) continue;

      const lightness = Math.min(0.75, i * 0.25);
      const bc = i === 0 ? m.color : lightenColor(m.color, lightness);

      datasets.push({
        label: day.date,
        data: points,
        borderColor: bc,
        backgroundColor: i === 0 ? m.color + "22" : "transparent",
        tension: 0.2,
        fill: i === 0,
        pointRadius: i === 0 ? 2 : 0,
        pointHitRadius: i === 0 ? 8 : 0,
      });
    }

    charts[m.id] = new Chart(ctx, {
      type: "line",
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        parsing: false,
        interaction: { mode: "nearest", axis: "x", intersect: false },
        plugins: {
          zoom: makeZoomOpts(),
          legend: { display: false },
          tooltip: {
            filter: (item, idx) => idx === 0,
            callbacks: {
              title: items => {
                const x = items[0]?.parsed?.x;
                return x != null ? fmtTick(x) : "";
              },
              label: function(item) {
                const chart = item.chart;
                const x = item.parsed.x;
                const tolerance = 3;
                const lines = [];
                for (const ds of chart.data.datasets) {
                  let best = null, bestDist = Infinity;
                  for (const pt of ds.data) {
                    const d = Math.abs(pt.x - x);
                    if (d < bestDist) { bestDist = d; best = pt; }
                  }
                  if (best != null && bestDist <= tolerance) {
                    const val = m.fix ? best.y.toFixed(1) : best.y;
                    lines.push(fmtDayLabel(ds.label) + " " + fmtTick(best.x) + ": " + val);
                  }
                }
                lines.sort();
                return lines.length ? lines : null;
              },
            },
          },
        },
        scales: {
          x: {
            type: "linear",
            min: 360,
            max: 1320,
            ticks: {
              callback: v => fmtTick(v),
              stepSize: 60,
              maxTicksLimit: 20,
              font: { size: 10 },
            },
            grid: { display: false },
          },
          y: {
            beginAtZero: false,
            title: { display: true, text: m.yTitle, font: { size: 10 } },
            ticks: {
              font: { size: 10 },
              callback: m.fix ? v => v.toFixed(1) : v => v,
            },
          },
        },
      },
    });
  }
}

function resetZoom() {
  Object.values(charts).forEach(c => c.resetZoom());
}

async function fetchData() {
  const errEl = document.getElementById("error");
  errEl.textContent = "";
  try {
    const resp = await fetch("/api/readings/days?days=7");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const dayGroups = await resp.json();
    renderStats(dayGroups);
    buildCharts(dayGroups);
  } catch (e) {
    errEl.textContent = "Chyba načítání dat: " + e.message;
  }
}

fetchData();

// SSE — notifikace od serveru při novém scrapnutí
const es = new EventSource("/api/events");
es.addEventListener("new_data", () => {
  fetchData();
});
es.addEventListener("error", () => {
  // fallback: pokud SSE spadne, obnovíme polling
  if (!window._sseFallback) {
    window._sseFallback = setInterval(fetchData, 30000);
  }
});
</script>
</body>
</html>
